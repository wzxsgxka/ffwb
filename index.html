<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电竞智能体集成助手平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-[#1F2937]">
    <div id="app" class="flex h-screen">
        <!-- Left Sidebar -->
        <aside class="w-[220px] bg-[#111827] text-white h-screen flex flex-col border-r border-gray-700">
            <!-- Logo -->
            <div class="p-6">
                <h1 class="text-xl font-bold">电竞智能体</h1>
                <p class="text-xs text-gray-400">KPL应援平台</p>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 mt-8 space-y-2 px-4">
                <a href="#" class="flex items-center px-4 py-3 text-sm font-medium rounded-lg bg-blue-600 active-menu">首页</a>
                <a href="#" class="flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-gray-700">应援陪伴系统</a>
                <a href="#" class="flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-gray-700">赛事</a>
                <a href="#" class="flex items-center px-4 py-3 text-sm font-medium rounded-lg hover:bg-gray-700">KPL科普</a>
            </nav>

            <!-- User/Auth -->
            <div class="p-4" id="auth-section">
                <div id="logged-out-view" class="space-y-2">
                    <button id="login-btn" class="w-full px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">登录</button>
                    <button id="register-btn" class="w-full px-4 py-2 text-sm font-medium bg-gray-700 rounded-lg hover:bg-gray-600">注册</button>
                </div>
                <div id="logged-in-view" class="hidden">
                    <p class="text-sm font-medium text-center" id="welcome-message"></p>
                    <button id="logout-btn" class="w-full mt-2 text-sm text-red-500 hover:underline">退出</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 bg-white/20 overflow-y-auto">
            <div id="page-home" class="p-8 h-full">
                <div class="grid grid-cols-10 gap-8 h-full">
                    <div class="col-span-8 flex flex-col">
                        <div class="text-center mb-8 text-white mt-8" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">
                            <h1 class="text-4xl font-bold">电竞智能体集成助手平台</h1>
                            <p class="text-lg text-gray-300 mt-2">KPL选手专属应援平台</p>
                        </div>
                        <div class="flex-grow h-4/5 relative flex items-center justify-center">
                            <section id="slider">
                                <input type="radio" name="slider" id="s1" checked>
                                <input type="radio" name="slider" id="s2">
                                <input type="radio" name="slider" id="s3">
                                <input type="radio" name="slider" id="s4">
                                <input type="radio" name="slider" id="s5">
                                
                                <label for="s1"><img src="banner1.jpg" alt=""></label>
                                <label for="s2"><img src="banner2.jpg" alt=""></label>
                                <label for="s3"><img src="banner3.jpg" alt=""></label>
                                <label for="s4"><img src="banner4.jpg" alt=""></label>
                                <label for="s5"><img src="banner5.jpg" alt=""></label>
                            </section>
                        </div>
                    </div>
                    <div id="floating-announcements" class="col-span-2"></div>
                </div>
            </div>

            <div id="page-companion" class="hidden h-full">
                <div class="flex h-full">
                    <nav class="w-[180px] bg-[#111827] text-white flex-shrink-0">
                        <div class="p-4 space-y-2">
                            <a href="#" class="block px-4 py-3 text-sm font-medium rounded-lg relative hover:bg-gray-700 active-submenu">结契</a>
                            <a href="#" class="block px-4 py-3 text-sm font-medium rounded-lg relative hover:bg-gray-700">任务</a>
                            <a href="#" class="block px-4 py-3 text-sm font-medium rounded-lg relative hover:bg-gray-700">铁粉问答</a>
                            <a href="#" class="block px-4 py-3 text-sm font-medium rounded-lg relative hover:bg-gray-700">专属休息室</a>
                        </div>
                    </nav>
                    <div class="flex-1 p-8 overflow-y-auto">
                        <div id="subpage-bond">
                            <!-- Bond page content will be rendered here -->
                        </div>
                        <div id="subpage-tasks" class="hidden text-white">
                            <h2 class="text-2xl font-bold">任务模块开发中...</h2>
                        </div>
                        <div id="subpage-quiz" class="hidden text-white">
                            <h2 class="text-2xl font-bold">铁粉问答模块开发中...</h2>
                        </div>
                        <div id="subpage-lounge" class="hidden text-white">
                            <h2 class="text-2xl font-bold">专属休息室模块开发中...</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-events" class="hidden p-8">
                <h2 class="text-2xl font-bold text-white">赛事模块开发中...</h2>
            </div>
            <div id="page-wiki" class="hidden p-8">
                <h2 class="text-2xl font-bold text-white">KPL科普模块开发中...</h2>
            </div>
        </main>
    </div>

    <!-- Auth Modals -->
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-lg w-96 shadow-xl">
            <h2 class="text-2xl font-bold mb-4">登录</h2>
            <input id="login-username" type="text" placeholder="用户名" class="w-full p-2 border rounded mb-4">
            <input id="login-password" type="password" placeholder="密码" class="w-full p-2 border rounded mb-4">
            <p id="login-error" class="text-red-500 text-sm mb-4 hidden"></p>
            <button id="login-submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">登录</button>
            <button id="login-close" class="w-full mt-2 text-sm text-gray-500 hover:underline">关闭</button>
        </div>
    </div>
    <div id="register-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-lg w-96 shadow-xl">
            <h2 class="text-2xl font-bold mb-4">注册</h2>
            <input id="register-username" type="text" placeholder="用户名" class="w-full p-2 border rounded mb-4">
            <input id="register-password" type="password" placeholder="密码 (至少6位，含字母和数字)" class="w-full p-2 border rounded mb-4">
            <p id="register-error" class="text-red-500 text-sm mb-4 hidden"></p>
            <button id="register-submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">注册</button>
            <button id="register-close" class="w-full mt-2 text-sm text-gray-500 hover:underline">关闭</button>
        </div>
    </div>

    <!-- Notification Popup -->
    <div id="notification-popup" class="fixed bottom-5 right-5 bg-gray-800 text-white p-6 rounded-lg shadow-lg max-w-sm z-50">
        <button id="notification-close" class="absolute top-2 right-2 text-gray-400 hover:text-white">&times;</button>
        <h3 class="font-bold text-lg mb-4">📢 平台通知</h3>
        <p class="text-sm">
            五大智能体全新上线。<br>
            选手粉丝互动结契系统全新开启。<br>
            快来解锁你的专属休息室，与你喜欢的选手开启对话。<br>
            快来观看你热爱的赛事吧，与我们平台共同狂欢。
        </p>
    </div>

    <script src="app.js"></script>
</body>
</html>
